name: Generate Tektite Folder Indexes

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tektite-indexes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: generate-tektite-folder-indexes-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate tektite folder indexes
        run: python scripts/generate_tektite_folder_indexes.py

      - name: Refresh directory READMEs
        run: python scripts/generate_directory_readmes.py

      - name: Commit generated index updates
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No index changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: regenerate tektite folder indexes"
          git push
