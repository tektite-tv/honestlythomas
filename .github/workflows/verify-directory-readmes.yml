name: Verify Directory READMEs

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check generated README files
        run: python scripts/generate_directory_readmes.py --check
