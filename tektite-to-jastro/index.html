<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tektite to Jastro</title>
  <style>
    :root {
      color-scheme: dark;
      --panel-width: min(92vw, 1200px);
      --panel-radius: 28px;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      --overlay: rgba(8, 10, 18, 0.52);
      --transition-ms: 520ms;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #05070b;
      color: #f7f5ef;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
    }

    body {
      overflow: hidden;
    }

    button,
    img {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 185, 85, 0.18), transparent 35%),
        linear-gradient(180deg, #10131d 0%, #05070b 100%);
    }

    .backdrop,
    .backdrop-next {
      position: absolute;
      inset: -4%;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      filter: blur(32px) saturate(1.1);
      transform: scale(1.08);
      opacity: 0;
    }

    .backdrop.visible,
    .backdrop-next.visible {
      opacity: 1;
    }

    .shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34), rgba(0, 0, 0, 0.48)),
        radial-gradient(circle at center, rgba(255, 255, 255, 0.08), transparent 44%);
      pointer-events: none;
    }

    .viewer {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .stage {
      position: relative;
      width: var(--panel-width);
      max-width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: var(--panel-radius);
      overflow: hidden;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: var(--shadow);
      padding: 0;
      color: inherit;
    }

    .stage:focus-visible {
      outline: 3px solid rgba(255, 214, 116, 0.85);
      outline-offset: 4px;
    }

    .slide,
    .slide-next {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      background: rgba(0, 0, 0, 0.22);
    }

    .slide.visible,
    .slide-next.visible {
      opacity: 1;
    }

    .app.is-glitching .backdrop.visible {
      animation: backdrop-glitch-out var(--transition-ms) ease both;
    }

    .app.is-glitching .backdrop-next.visible {
      animation: backdrop-glitch-in var(--transition-ms) ease both;
    }

    .stage.is-glitching .slide.visible {
      animation: glitch-out var(--transition-ms) ease both;
    }

    .stage.is-glitching .slide-next.visible {
      animation: glitch-in var(--transition-ms) ease both;
    }

    @keyframes glitch-out {
      0% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
        filter: none;
        clip-path: inset(0 0 0 0);
      }
      16% {
        transform: translate3d(-18px, 0, 0) scale(1.02);
        filter: contrast(1.35) saturate(1.2) hue-rotate(-18deg);
      }
      17% {
        transform: translate3d(14px, 0, 0) scale(1.02);
      }
      34% {
        opacity: 0.95;
        clip-path: inset(0 0 0 0);
      }
      35% {
        clip-path: inset(8% 0 46% 0);
      }
      52% {
        opacity: 0.7;
        transform: translate3d(-26px, 0, 0) scale(1.04);
        filter: contrast(1.55) saturate(1.45) hue-rotate(-32deg);
      }
      53% {
        transform: translate3d(22px, 0, 0) scale(1.04);
        clip-path: inset(46% 0 14% 0);
      }
      78% {
        opacity: 0.3;
        transform: translate3d(-8px, 0, 0) scale(1.06);
        filter: contrast(1.8) brightness(0.8) saturate(1.6);
      }
      100% {
        opacity: 0;
        transform: translate3d(0, 0, 0) scale(1.08);
        filter: contrast(1.95) brightness(0.75) saturate(1.7);
        clip-path: inset(68% 0 0 0);
      }
    }

    @keyframes glitch-in {
      0% {
        opacity: 0;
        transform: translate3d(28px, 0, 0) scale(1.08);
        filter: contrast(1.8) brightness(1.25) saturate(1.7) hue-rotate(72deg);
        clip-path: inset(72% 0 0 0);
      }
      18% {
        opacity: 0.45;
        transform: translate3d(-20px, 0, 0) scale(1.05);
        clip-path: inset(12% 0 44% 0);
      }
      19% {
        transform: translate3d(16px, 0, 0) scale(1.05);
      }
      40% {
        opacity: 0.78;
        transform: translate3d(0, 0, 0) scale(1.03);
        filter: contrast(1.45) brightness(1.12) saturate(1.35) hue-rotate(18deg);
        clip-path: inset(0 0 0 0);
      }
      62% {
        opacity: 0.88;
        transform: translate3d(-8px, 0, 0) scale(1.015);
        filter: contrast(1.25) brightness(1.06) saturate(1.18);
      }
      63% {
        transform: translate3d(6px, 0, 0) scale(1.015);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
        filter: none;
        clip-path: inset(0 0 0 0);
      }
    }

    @keyframes backdrop-glitch-out {
      0% {
        opacity: 1;
        transform: scale(1.08);
        filter: blur(32px) saturate(1.1);
      }
      45% {
        opacity: 0.7;
        transform: scale(1.12) translate3d(-1%, 0, 0);
        filter: blur(34px) saturate(1.45) hue-rotate(-22deg);
      }
      100% {
        opacity: 0;
        transform: scale(1.16);
        filter: blur(38px) saturate(1.6) brightness(0.78);
      }
    }

    @keyframes backdrop-glitch-in {
      0% {
        opacity: 0;
        transform: scale(1.16);
        filter: blur(38px) saturate(1.65) hue-rotate(48deg);
      }
      45% {
        opacity: 0.72;
        transform: scale(1.12) translate3d(1%, 0, 0);
        filter: blur(34px) saturate(1.35) hue-rotate(14deg);
      }
      100% {
        opacity: 1;
        transform: scale(1.08);
        filter: blur(32px) saturate(1.1);
      }
    }

    .slide-index {
      position: absolute;
      top: 18px;
      right: 20px;
      z-index: 4;
      margin: 0;
      padding: 5px;
      border: 3px solid #ffffff;
      border-radius: 10px;
      background: #000000;
      color: limegreen;
      font-family: "Courier New", Courier, monospace;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.04em;
      transform: scale(1.2);
      transform-origin: top right;
      text-shadow:
        -1px -1px 0 #6d28d9,
        1px -1px 0 #6d28d9,
        -1px 1px 0 #6d28d9,
        1px 1px 0 #6d28d9,
        0 0 12px rgba(109, 40, 217, 0.45);
      pointer-events: none;
    }

    .status {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      z-index: 3;
      background: rgba(5, 7, 11, 0.7);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .status-card {
      max-width: 520px;
      padding: 24px 28px;
      border-radius: 24px;
      background: rgba(17, 22, 32, 0.92);
      box-shadow: var(--shadow);
    }

    .status-card h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      letter-spacing: 0.04em;
    }

    .status-card p {
      margin: 0;
      line-height: 1.55;
      color: rgba(247, 245, 239, 0.84);
    }

    .status.hidden {
      display: none;
    }

    @media (min-width: 769px) {
      .viewer {
        padding: 0;
      }

      .stage {
        width: 100vw;
        height: 100vh;
        max-width: none;
        aspect-ratio: auto;
        border-radius: 0;
        box-shadow: none;
        background: #000000;
      }

      .slide,
      .slide-next {
        object-fit: fill;
      }
    }

    @media (max-width: 768px) {
      :root {
        --panel-width: 100vw;
        --panel-radius: 0;
        --shadow: none;
        --overlay: rgba(8, 10, 18, 0.36);
      }

      .viewer {
        padding: 0;
      }

      .stage {
        width: 100vw;
        height: 100vh;
        aspect-ratio: auto;
      }

      .slide-index {
        top: 16px;
        right: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="backdrop visible" id="backdrop"></div>
    <div class="backdrop-next" id="backdropNext"></div>
    <div class="shade"></div>

    <main class="viewer">
      <button class="stage" id="stage" type="button" aria-label="Advance slideshow">
        <img class="slide visible" id="slide" alt="" />
        <img class="slide-next" id="slideNext" alt="" />
        <p class="slide-index" id="slideIndex" aria-hidden="true">#1</p>
      </button>
    </main>

    <div class="status" id="status">
      <div class="status-card">
        <h1 id="statusTitle">Loading slideshow</h1>
        <p id="statusText">Fetching image lists from the generated index files.</p>
      </div>
    </div>
  </div>

  <script>
    const MOBILE_QUERY = window.matchMedia("(max-width: 768px)");
    const ORDER_URL = "/tektite-to-jastro/order.json";
    const TRANSITION_MS = 520;
    const SOURCES = {
      mobile: {
        url: "/tektite-to-jastro/images_9x16/index.json"
      },
      desktop: {
        url: "/tektite-to-jastro/images_16x9/index.json"
      }
    };

    const stage = document.getElementById("stage");
    const app = document.querySelector(".app");
    const slide = document.getElementById("slide");
    const slideNext = document.getElementById("slideNext");
    const backdrop = document.getElementById("backdrop");
    const backdropNext = document.getElementById("backdropNext");
    const slideIndex = document.getElementById("slideIndex");
    const status = document.getElementById("status");
    const statusTitle = document.getElementById("statusTitle");
    const statusText = document.getElementById("statusText");

    if (window.location.search) {
      window.history.replaceState(null, "", window.location.pathname);
    }

    let activeMode = "";
    let slides = [];
    let index = 0;
    let isTransitioning = false;

    function getMode() {
      return MOBILE_QUERY.matches ? "mobile" : "desktop";
    }

    function toAssetUrl(relativePath) {
      return "/" + relativePath.replace(/^\/+/, "");
    }

    function normalizeSlidePath(value) {
      return value
        .trim()
        .replace(/^\/+/, "")
        .replace(/^tektite-to-jastro\/+/, "");
    }

    function toRepoRelativePath(value) {
      const normalizedPath = normalizeSlidePath(String(value || ""));
      if (!normalizedPath) {
        return "";
      }

      return "tektite-to-jastro/" + normalizedPath;
    }

    function preloadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(src);
        image.onerror = reject;
        image.src = src;
      });
    }

    function buildOrderedSlides(mode, entries) {
      const imageKey = mode === "mobile" ? "mobileImage" : "desktopImage";

      return entries
        .map((entry) => {
          const relativePath = toRepoRelativePath(entry && entry[imageKey]);
          if (!relativePath) {
            return null;
          }

          return {
            name: relativePath.split("/").pop(),
            relativePath
          };
        })
        .filter(Boolean);
    }

    async function fetchOrderedSlides(mode) {
      const response = await fetch(ORDER_URL, { cache: "no-store" });
      if (!response.ok) {
        return [];
      }

      const payload = await response.json();
      const entries = Array.isArray(payload.slides) ? payload.slides : [];
      return buildOrderedSlides(mode, entries);
    }

    async function fetchSlides(mode) {
      const orderedSlides = await fetchOrderedSlides(mode);
      if (orderedSlides.length) {
        return orderedSlides;
      }

      const response = await fetch(SOURCES[mode].url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Unable to load " + SOURCES[mode].url);
      }

      const payload = await response.json();
      return Array.isArray(payload.images) ? payload.images : [];
    }

    function updateStatus(title, text, visible) {
      statusTitle.textContent = title;
      statusText.textContent = text;
      status.classList.toggle("hidden", !visible);
    }

    function applyFrame(frame) {
      const assetUrl = toAssetUrl(frame.relativePath);
      slide.src = assetUrl;
      slide.alt = frame.name;
      slide.classList.add("visible");
      backdrop.style.backgroundImage = 'url("' + assetUrl + '")';
      backdrop.classList.add("visible");
      slideIndex.textContent = "#" + (index + 1);
    }

    async function showInitialSlide() {
      const frame = slides[index];
      await preloadImage(toAssetUrl(frame.relativePath));
      applyFrame(frame);
    }

    async function advanceSlide() {
      if (isTransitioning || slides.length < 2) {
        return;
      }

      isTransitioning = true;
      const nextIndex = (index + 1) % slides.length;
      const frame = slides[nextIndex];
      const assetUrl = toAssetUrl(frame.relativePath);

      try {
        await preloadImage(assetUrl);
      } catch (error) {
        console.error(error);
        isTransitioning = false;
        return;
      }

      slideNext.src = assetUrl;
      slideNext.alt = frame.name;
      backdropNext.style.backgroundImage = 'url("' + assetUrl + '")';

      requestAnimationFrame(() => {
        stage.classList.remove("is-glitching");
        app.classList.remove("is-glitching");
        void stage.offsetWidth;
        slideNext.classList.add("visible");
        backdropNext.classList.add("visible");
        stage.classList.add("is-glitching");
        app.classList.add("is-glitching");
      });

      window.setTimeout(() => {
        index = nextIndex;
        applyFrame(frame);

        stage.classList.remove("is-glitching");
        app.classList.remove("is-glitching");
        slideNext.classList.remove("visible");
        backdropNext.classList.remove("visible");
        isTransitioning = false;
      }, TRANSITION_MS);
    }

    async function loadMode(mode) {
      activeMode = mode;
      index = 0;
      slides = [];
      isTransitioning = false;
      slide.classList.remove("visible");
      slideNext.classList.remove("visible");
      backdrop.classList.remove("visible");
      backdropNext.classList.remove("visible");
      updateStatus("Loading slideshow", "Fetching image lists from the generated index files.", true);

      try {
        const loadedSlides = await fetchSlides(mode);
        if (!loadedSlides.length) {
          throw new Error("No images found in " + SOURCES[mode].url);
        }

        slides = loadedSlides;
        await showInitialSlide();
        updateStatus("Ready", "Slideshow loaded.", false);
      } catch (error) {
        console.error(error);
        updateStatus(
          "Could not load images",
          "The slideshow could not read " + SOURCES[mode].url + ". Make sure the index file exists and is being served.",
          true
        );
      }
    }

    stage.addEventListener("click", () => {
      advanceSlide();
    });

    stage.addEventListener("keydown", (event) => {
      if (event.key === " " || event.key === "Enter" || event.key === "ArrowRight") {
        event.preventDefault();
        advanceSlide();
      }
    });

    MOBILE_QUERY.addEventListener("change", () => {
      const nextMode = getMode();
      if (nextMode !== activeMode) {
        loadMode(nextMode);
      }
    });

    loadMode(getMode());
  </script>
</body>
</html>
