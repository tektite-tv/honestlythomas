<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honestly, Thomas?</title>
  <style>
    :root {
      --mx: 50vw;
      --my: 50vh;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Cooper Black", "Cooper Std", "Georgia", serif;
      background: #08070d;
      color: white;
    }

    body {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at var(--mx) var(--my),
          rgba(146, 255, 163, 0.22),
          rgba(129, 76, 255, 0.18) 18%,
          rgba(17, 8, 31, 0) 42%),
        linear-gradient(180deg,
          #2f0d69 0%,
          #1f0d49 22%,
          #0c1a3f 44%,
          #11473e 68%,
          #7f1fff 86%,
          #4fffa0 100%);
      z-index: 0;
    }

    .bg::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(186, 95, 255, 0.25) 0 14px,
          rgba(71, 255, 168, 0.20) 14px 28px,
          rgba(18, 11, 47, 0.22) 28px 42px,
          rgba(138, 255, 191, 0.15) 42px 56px
        );
      mix-blend-mode: screen;
      opacity: 0.65;
      filter: saturate(1.25) contrast(1.15);
      animation: waterfallSlide 9s linear infinite;
    }

    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%,
          rgba(255,255,255,0.14), transparent 28%),
        radial-gradient(circle at 50% 60%,
          rgba(255,255,255,0.09), transparent 32%),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.05) 0 3px,
          rgba(0,0,0,0) 3px 18px
        ),
        repeating-linear-gradient(
          180deg,
          rgba(0,0,0,0.13) 0 3px,
          rgba(255,255,255,0.03) 3px 18px
        );
      opacity: 0.65;
      image-rendering: pixelated;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center,
          rgba(255,255,255,0.02) 0 35%,
          rgba(0,0,0,0.22) 72%,
          rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 980px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 28px;
      text-align: center;
    }

    h1 {
      margin: 0 20px;
      font-size: clamp(2.1rem, 5.2vw, 4.5rem);
      line-height: 1.04;
      letter-spacing: 0.03em;
      text-shadow:
        0 0 4px rgba(255,255,255,0.35),
        0 0 12px rgba(144,255,176,0.35),
        0 0 22px rgba(169,83,255,0.28);
      animation: titleRainbow 4s linear infinite, titlePulse 2.2s ease-in-out infinite;
      user-select: none;
    }

    .hero-link {
      margin-top: 42px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: white;
      gap: 16px;
    }

    .face-wrap {
      width: min(46vw, 260px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      padding: 10px;
      background:
        linear-gradient(135deg, rgba(152,255,174,0.95), rgba(138,54,255,0.95));
      box-shadow:
        0 0 0 4px rgba(255,255,255,0.10),
        0 10px 26px rgba(0,0,0,0.45),
        0 0 30px rgba(126, 255, 178, 0.25),
        0 0 48px rgba(147, 66, 255, 0.25);
      transform: translateY(0) scale(1);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      position: relative;
      overflow: hidden;
    }

    .face-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.26) 0%,
          rgba(255,255,255,0.07) 22%,
          rgba(255,255,255,0) 40%,
          rgba(0,0,0,0.16) 100%);
      pointer-events: none;
    }

    .hero-link:hover .face-wrap,
    .hero-link:focus-visible .face-wrap {
      transform: translateY(-4px) scale(1.03);
      box-shadow:
        0 0 0 4px rgba(255,255,255,0.13),
        0 16px 34px rgba(0,0,0,0.52),
        0 0 38px rgba(126, 255, 178, 0.35),
        0 0 58px rgba(147, 66, 255, 0.35);
      filter: saturate(1.12) brightness(1.05);
    }

    .hero-link:active .face-wrap {
      transform: translateY(1px) scale(0.985);
    }

    .face {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
      border: 4px solid rgba(12, 9, 18, 0.65);
      background: rgba(0,0,0,0.24);
    }

    .cta {
      font-family: "Cooper Black", "Cooper Std", "Georgia", serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: 0.02em;
      text-shadow:
        0 0 4px rgba(255,255,255,0.25),
        0 0 10px rgba(125,255,164,0.24);
      transition: transform 180ms ease, text-shadow 180ms ease;
    }

    .cta img {
      width:150px;
    }

    .hero-link:hover .cta,
    .hero-link:focus-visible .cta {
      transform: scale(1.05);
      text-shadow:
        0 0 6px rgba(255,255,255,0.35),
        0 0 16px rgba(125,255,164,0.38),
        0 0 26px rgba(150,70,255,0.3);
    }

    @keyframes waterfallSlide {
      0%   { transform: translateY(-28px); }
      100% { transform: translateY(28px); }
    }

    @keyframes titlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes titleRainbow {
      0%   { color: #ff73d2; }
      16%  { color: #ffb36b; }
      32%  { color: #fff07d; }
      48%  { color: #77ff94; }
      64%  { color: #78fff8; }
      80%  { color: #7ea2ff; }
      100% { color: #d784ff; }
    }

    @media (max-width: 640px) {
      .container {
        padding-top: 22px;
      }

      .hero-link {
        margin-top: 34px;
      }

      .face-wrap {
        width: min(64vw, 240px);
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="vignette"></div>

  <main class="container">
    <h1>Honestly, Thomas?</h1>

    <a class="hero-link" href="https://youtube.com/@Honestly_Thomas" target="_blank" rel="noopener noreferrer" aria-label="Visit Honestly Thomas on YouTube">
      <div class="face-wrap">
        <img class="face" src="/media/images/pngs/face.png" alt="Honestly Thomas portrait" />
      </div>
      <div class="cta">You Make Videos?<br>On <img src="/media/images/pngs/oldtube.png"> ???<br>Sub me up!</div>
    </a>
  </main>

  <script>
    const root = document.documentElement;

    window.addEventListener('mousemove', (e) => {
      root.style.setProperty('--mx', e.clientX + 'px');
      root.style.setProperty('--my', e.clientY + 'px');
    });

    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      if (!t) return;
      root.style.setProperty('--mx', t.clientX + 'px');
      root.style.setProperty('--my', t.clientY + 'px');
    }, { passive: true });
  </script>
</body>
</html>
